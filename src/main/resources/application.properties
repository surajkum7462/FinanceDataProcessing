spring.application.name=FinanceDataProcessing

spring.datasource.url=jdbc:mysql://localhost:3306/financedata
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:your-256-bit-secret-change-me-please-use-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.seed.enabled=${APP_SEED_ENABLED:true}
